services:
  loki:
    image: grafana/loki:2.9.0
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - loki

  promtail:
    image: grafana/promtail:2.9.0
    container_name: promtail
    volumes:
      - /var/log:/var/log:ro
      - ./promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  log-generator:
    image: alpine:latest
    container_name: log-generator
    command: >
      /bin/sh -c "
        apk add --no-cache coreutils > /dev/null 2>&1;
        APPS='nginx api gateway auth payments';
        LEVELS='INFO INFO INFO INFO INFO WARN ERROR DEBUG';
        MSGS_INFO='request completed|connection opened|cache hit|health check passed|config reloaded';
        MSGS_WARN='high latency detected|retry attempt|deprecated endpoint called|connection pool near limit';
        MSGS_ERROR='connection refused|timeout exceeded|null pointer exception|disk space critical|OOM killed';
        MSGS_DEBUG='entering function|variable state dumped|query plan generated';
        while true; do
          APP=$$(echo $$APPS | tr ' ' '\n' | shuf -n1);
          LEVEL=$$(echo $$LEVELS | tr ' ' '\n' | shuf -n1);
          case $$LEVEL in
            INFO)  MSG=$$(echo $$MSGS_INFO  | tr '|' '\n' | shuf -n1) ;;
            WARN)  MSG=$$(echo $$MSGS_WARN  | tr '|' '\n' | shuf -n1) ;;
            ERROR) MSG=$$(echo $$MSGS_ERROR | tr '|' '\n' | shuf -n1) ;;
            DEBUG) MSG=$$(echo $$MSGS_DEBUG | tr '|' '\n' | shuf -n1) ;;
          esac;
          echo \"{\\\"ts\\\":\\\"$$(date -u +%Y-%m-%dT%H:%M:%SZ)\\\",\\\"level\\\":\\\"$$LEVEL\\\",\\\"app\\\":\\\"$$APP\\\",\\\"msg\\\":\\\"$$MSG\\\"}\";
          sleep $$(shuf -i 1-3 -n1);
        done
      "
    labels:
      job: log-generator

volumes:
  loki_data:
  grafana_data:
