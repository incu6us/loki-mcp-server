name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: Build binaries
        run: |
          targets="linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64"
          for target in $targets; do
            os="${target%/*}"
            arch="${target#*/}"
            output="loki-mcp-server-${os}-${arch}"
            ext=""
            if [ "$os" = "windows" ]; then
              ext=".exe"
            fi
            GOOS=$os GOARCH=$arch go build -o "${output}${ext}" ./cmd/loki-mcp-server
          done

      - name: Create archives
        run: |
          for f in loki-mcp-server-linux-* loki-mcp-server-darwin-*; do
            tar czf "${f}.tar.gz" "$f"
            rm "$f"
          done
          for f in loki-mcp-server-windows-*.exe; do
            zip "${f%.exe}.zip" "$f"
            rm "$f"
          done

      - name: Generate checksums
        run: sha256sum loki-mcp-server-*.tar.gz loki-mcp-server-*.zip > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            loki-mcp-server-*.tar.gz
            loki-mcp-server-*.zip
            checksums.txt
