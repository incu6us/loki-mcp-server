name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"
      - uses: golangci/golangci-lint-action@v6

  test-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"
      - run: go test ./internal/...

  test-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"
      - run: go test -v -count=1 -timeout 120s ./tests/e2e

  build:
    runs-on: ubuntu-latest
    needs: [lint, test-unit, test-e2e]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"
      - run: go build -o loki-mcp-server ./cmd/loki-mcp-server
